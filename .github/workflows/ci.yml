# ==============================================================================
# CI - INTEGRACIÓN CONTINUA
# ==============================================================================
# Este workflow se ejecuta en cada PR y push a main.
# Valida que el código compile, pase el linter y los tipos estén bien.
#
# Es CRÍTICO para la seguridad del automerge de Dependabot:
# Sin este CI, cualquier actualización haría merge sin validación.
# ==============================================================================

name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# Cancela workflows anteriores del mismo PR para ahorrar recursos
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # VALIDACIÓN DE CÓDIGO
  # ============================================================================
  validate:
    name: Validar código
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Verificar tipos TypeScript
        run: pnpm typecheck

      - name: Ejecutar linter (Biome)
        run: pnpm lint

  # ============================================================================
  # BUILD DE PRODUCCIÓN
  # ============================================================================
  build:
    name: Build de producción
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build de producción
        run: pnpm build

      - name: Verificar tamaño del bundle
        run: |
          echo "Tamaño del build:"
          du -sh apps/webapp/dist/
          echo ""
          echo "Archivos generados:"
          find apps/webapp/dist -type f -name "*.js" -o -name "*.css" | head -20

      # Opcional: subir artefacto del build
      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: webapp-build
          path: apps/webapp/dist/
          retention-days: 7

  # ============================================================================
  # AUDITORÍA DE SEGURIDAD
  # ============================================================================
  security:
    name: Auditoría de seguridad
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Auditoría de dependencias
        run: pnpm audit --audit-level=high
        # Nota: usa 'high' para no fallar en vulnerabilidades moderadas
        # que a veces no tienen fix disponible
        continue-on-error: true

      - name: Reporte de auditoría
        if: always()
        run: |
          echo "Reporte completo de auditoría:"
          pnpm audit || true
