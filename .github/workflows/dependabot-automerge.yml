# ==============================================================================
# AUTOMERGE SEGURO PARA DEPENDABOT
# ==============================================================================
# Este workflow hace automerge de PRs de Dependabot SOLO si:
#   1. Es una actualización patch o minor (las major requieren revisión).
#   2. Todos los checks de CI pasan.
#   3. El PR es realmente de Dependabot (previene spoofing).
#
# Seguridad:
#   - Usa el token limitado de GitHub Actions, no un PAT personal.
#   - Verifica el actor del evento (dependabot[bot]) antes de actuar.
#   - Solo se dispara en `pull_request`, NO en `pull_request_target`.
#     Esto es importante: con `pull_request_target` y checkout del PR head,
#     un PR malicioso podría ejecutar código con acceso a los secretos del
#     repo. Con `pull_request` el workflow se ejecuta en el contexto del PR
#     y los secretos NO se exponen al código del PR.
# ==============================================================================

name: Dependabot Automerge

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  # ============================================================================
  # JOB 1: VALIDAR EL CÓDIGO DEL PR
  # ============================================================================
  # Ejecuta los mismos pasos que el CI principal sobre el código del PR.
  # Solo corre si el PR es de Dependabot (filtrado en cada step).
  # ============================================================================
  validate:
    name: Validar PR de Dependabot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Checkout código del PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Verificar tipos TypeScript
        run: pnpm typecheck

      - name: Ejecutar linter
        run: pnpm lint

      - name: Build de producción
        run: pnpm build

  # ============================================================================
  # JOB 2: AUTOMERGE CONDICIONAL
  # ============================================================================
  # Habilita automerge SOLO para patch/minor de Dependabot que pasaron CI.
  # ============================================================================
  automerge:
    name: Automerge
    runs-on: ubuntu-latest
    needs: validate
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Obtener metadata de Dependabot
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Habilitar automerge para patch y minor
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          echo "Tipo de actualización: ${{ steps.metadata.outputs.update-type }}"
          echo "Dependencia: ${{ steps.metadata.outputs.dependency-names }}"
          echo "Habilitando automerge..."
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notificar si es major (requiere revisión)
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          echo "ACTUALIZACIÓN MAJOR DETECTADA"
          echo "Dependencia: ${{ steps.metadata.outputs.dependency-names }}"
          echo "Este PR requiere revisión manual antes de hacer merge"
          echo ""
          echo "Las actualizaciones major pueden incluir breaking changes."
          echo "Por favor revisa el changelog antes de aprobar."

          gh pr comment "$PR_URL" --body "## Actualización Major

          Esta es una actualización **major** de \`${{ steps.metadata.outputs.dependency-names }}\`.

          Las actualizaciones major pueden incluir **breaking changes** que requieren cambios en el código.

          **Antes de aprobar:**
          1. Revisa el [changelog](https://github.com/${{ steps.metadata.outputs.dependency-names }}/releases) de la dependencia
          2. Verifica que no hay breaking changes que nos afecten
          3. Si es necesario, actualiza el código para adaptarlo

          Este PR **NO** será auto-mergeado."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}